name: Build source

on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Test and build Codex CLI
    runs-on: ubuntu-24.04
    env:
      RUST_MIN_STACK: "8388608"
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Test changed Rust packages
        run: cargo test --locked -p codex-code-mode -p codex-core
      - name: Build release binary
        if: ${{ (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && inputs.ref == 'main') }}
        run: cargo build --locked --release -p codex-cli
