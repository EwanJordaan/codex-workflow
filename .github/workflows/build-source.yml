name: Build source

on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Test and build Codex CLI
    runs-on: ubuntu-24.04
    env:
      RUST_MIN_STACK: "8388608"
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Test Rust unit packages
        run: cargo test --locked -p codex-code-mode -p codex-core --lib
      - name: Build release binary
        if: ${{ (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && inputs.ref == 'main') }}
        run: cargo build --locked --release -p codex-cli

  build-windows:
    name: Build Windows Codex CLI
    if: ${{ (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && inputs.ref == 'main') }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Build release binary
        run: cargo build --locked --release -p codex-cli
      - name: Upload Windows Codex CLI
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-windows-x86_64
          path: codex-rs/target/release/codexw.exe
          if-no-files-found: error
