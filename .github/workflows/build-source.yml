name: Build source

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Codex CLI
    runs-on: ubuntu-24.04
    env:
      RUST_MIN_STACK: "8388608"
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Restore Cargo build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            codex-rs/target
          key: build-source-${{ runner.os }}-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: build-source-${{ runner.os }}-
      - name: Build release binary
        run: cargo build --locked --release -p codex-cli
      - name: Test changed Rust packages
        run: cargo test --locked -p codex-code-mode -p codex-core
      - name: Upload Codex CLI
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-linux-x86_64
          path: codex-rs/target/release/codex
          if-no-files-found: error
