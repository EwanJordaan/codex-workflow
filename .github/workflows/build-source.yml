name: Build source

on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test Codex CLI
    runs-on: ubuntu-24.04
    env:
      RUST_MIN_STACK: "8388608"
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Test Rust unit packages
        run: cargo test --locked -p codex-code-mode -p codex-core --lib
      - name: Test workflow integration
        run: "cargo test --locked -p codex-core --test all workflow::"
      - name: Test workflow TUI
        run: cargo test --locked -p codex-tui workflows

  build-linux:
    name: Build Linux Codex CLI
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == 'main' }}
    runs-on: ubuntu-24.04
    env:
      RUST_MIN_STACK: "8388608"
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Build release binary
        run: cargo build --locked --release -p codex-cli

  build-windows:
    name: Build Windows Codex CLI
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == 'main' }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
      - name: Build release binary
        run: cargo build --locked --release -p codex-cli
      - name: Build standalone npm package
        shell: pwsh
        run: |
          $vendorBin = Join-Path $env:RUNNER_TEMP "codex-vendor/x86_64-pc-windows-msvc/bin"
          New-Item -ItemType Directory -Force -Path $vendorBin | Out-Null
          Copy-Item "target/release/codexw.exe" (Join-Path $vendorBin "codexw.exe")
          python ../codex-cli/scripts/build_npm_package.py `
            --package codex `
            --version "0.0.0-dev.${{ github.run_id }}" `
            --vendor-src (Join-Path $env:RUNNER_TEMP "codex-vendor") `
            --pack-output "target/release/codex-windows-x86_64.tgz"
      - name: Verify standalone npm package
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:RUNNER_TEMP "codex-npm-install"
          npm install --global --prefix $installRoot "target/release/codex-windows-x86_64.tgz"
          & (Join-Path $installRoot "codex.cmd") --version
      - name: Upload Windows Codex CLI
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-windows-x86_64
          path: |
            codex-rs/target/release/codexw.exe
            codex-rs/target/release/codex-windows-x86_64.tgz
          if-no-files-found: error
